# ~/.config/foot/foot.ini

# If you want to keep colors separate in a "dark.ini", uncomment the line below:
# include=~/.config/foot/dark.ini

[main]
term=xterm-256color

# Font configuration
font=ComicCode:style=medium:size=14
font-bold=ComicCode:style=Bold:size=14
font-italic=ComicCode:style=Italic:size=14
font-bold-italic=ComicCode:style=Bold Italic:size=14

# Matches Alacritty's offset.y = 1
vertical-letter-offset=1

# Window Padding (x=6, y=6)
pad=6x6

# Window Title and Class/Instance
title=Alacritty
app-id=Alacritty

[cursor]
blink=yes

[scrollback]
lines=5000

[colors-dark]
# Note: Hex colors in foot MUST NOT have the '#' prefix.

background=1e2124
foreground=00ef00

# Cursor format is: <text-color> <cursor-color>
# Uses the primary background for the text color, matching "CellBackground"
cursor=1e2124 528bff

# Selection colors
selection-background=3e4451

# Normal colors (Black, Red, Green, Yellow, Blue, Magenta, Cyan, White)
regular0=21222c
regular1=ff5555
regular2=50fa7b
regular3=f1fa8c
regular4=0bbecc
regular5=b271a9
regular6=0088aa
regular7=f8f8f2

# Bright colors
bright0=6272a4
bright1=ff6e6e
bright2=69ff94
bright3=ffffa5
bright4=d6acff
bright5=ff92df
bright6=a4ffff
bright7=ffffff

[key-bindings]
# Keybindings map an action to a key or list of keys
clipboard-paste=Control+Shift+v XF86Paste
clipboard-copy=Control+Shift+c XF86Copy
primary-paste=Shift+Insert

font-reset=Control+0
font-increase=Control+plus Control+equal
font-decrease=Control+minus

fullscreen=F11

scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
scrollback-home=Shift+Home
scrollback-end=Shift+End
